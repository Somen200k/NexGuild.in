kind = "web"
previewPath = "/"
title = "NexGuild"
version = "1.0.0"
id = "artifacts/nexguild"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21659

[services.development]
run = "pnpm --filter @workspace/nexguild run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexguild", "run", "build" ]
publicDir = "artifacts/nexguild/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21659"
BASE_PATH = "/"
